name: Continuos Delivery
on:
  push:
    branches:
      - main
jobs:
  Deliver:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
      - name: Simulando Continuous Delivery
        uses: actions/upload-artifact@v7
        with:
          name: arquivozip.zip
          path: |
            main.py
            README.md
            